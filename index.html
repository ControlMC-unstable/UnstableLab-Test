<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Unstable Lab Store</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="style.css?v=9">
</head>
<body>
  <div class="wrap">
    <header>
      <img class="logo" id="logo" src="logo.svg" alt="Unstable Lab"
           onerror="this.style.display='none';">
      <h1 id="server-name">Unstable Lab Store</h1>
      <p id="server-tagline">Loading…</p>
    </header>

    <div id="error" class="error" hidden></div>

    <div class="username-card">
      <div class="head" id="head" aria-hidden="true">?</div>
      <label for="username">Minecraft username:</label>
      <input id="username" type="text" placeholder="e.g. Steve" autocomplete="off" spellcheck="false">
      <span class="status" id="status">Enter your username to enable purchases.</span>
    </div>

    <div class="sections" id="sections"></div>

    <footer>
      Payments handled securely by Stripe. Your purchase is delivered in-game within about a minute of payment.
      <div class="footer-links">
        <a href="terms.html">Terms of Service</a>
      </div>
    </footer>
  </div>

  <script src="shop.js?v=9"></script>
  <script>
    function renderSections() {
      const container = document.getElementById('sections');
      // Remember which sections are open
      const openSections = new Set();
      container.querySelectorAll('.section-drop.open').forEach(el => {
        const id = el.dataset.sectionId;
        if (id) openSections.add(id);
      });
      container.innerHTML = '';
      const sections = (STATE.data && STATE.data.sections) || [];
      const hasUser = isValidUsername(STATE.username);

      for (const s of sections) {
        const drop = document.createElement('div');
        drop.className = 'section-drop';
        drop.dataset.sectionId = s.id;
        if (openSections.has(s.id)) drop.classList.add('open');

        // Toggle button
        const toggle = document.createElement('button');
        toggle.className = 'section-toggle';
        toggle.type = 'button';
        toggle.innerHTML = `
          <div class="icon"></div>
          <div class="section-info">
            <strong></strong>
            <span></span>
          </div>
          <div class="chevron">▾</div>
        `;
        toggle.querySelector('.icon').textContent = s.icon || '📦';
        toggle.querySelector('strong').textContent = s.name;
        toggle.querySelector('span').textContent = s.description || '';
        toggle.addEventListener('click', () => {
          drop.classList.toggle('open');
        });

        // Products body
        const body = document.createElement('div');
        body.className = 'section-body';
        const products = document.createElement('div');
        products.className = 'section-products';

        for (const p of (s.products || [])) {
          const row = document.createElement('div');
          row.className = 'product';
          const noQty = !!s.no_quantity;
          const cart = getCart();
          const inCart = cart.find(i => i.id === p.id);

          row.innerHTML = `
            <div class="product-info">
              <h3></h3>
              <div class="desc"></div>
            </div>
            <div class="product-price"></div>
            <div class="product-actions">
              ${inCart
                ? (noQty
                  ? `<button class="add-cart-btn in-cart" disabled>Added to Cart</button>`
                  : `<div class="inline-qty">
                       <button class="inline-qty-btn" data-dir="-1">−</button>
                       <span class="inline-qty-val">${inCart.qty || 1}</span>
                       <button class="inline-qty-btn" data-dir="1">+</button>
                     </div>
                     <button class="add-cart-btn in-cart" disabled>Added to Cart</button>`)
                : `<button class="add-cart-btn" data-product-id="${p.id}" ${hasUser ? '' : 'disabled'}>${hasUser ? 'Add to Cart' : 'Enter username'}</button>`
              }
            </div>
          `;
          row.querySelector('h3').textContent = p.name;
          row.querySelector('.product-price').textContent = p.price_display;

          const descEl = row.querySelector('.desc');
          if (Array.isArray(p.description) && p.description.length) {
            const ul = document.createElement('ul');
            for (const item of p.description) {
              const li = document.createElement('li');
              li.textContent = item;
              ul.appendChild(li);
            }
            descEl.appendChild(ul);
          } else if (p.description) {
            descEl.textContent = p.description;
          }

          const productWithMeta = Object.assign({}, p, noQty ? { no_quantity: true } : {});

          if (inCart && !noQty) {
            // Wire up +/- buttons
            row.querySelectorAll('.inline-qty-btn').forEach(btn => {
              btn.addEventListener('click', () => {
                const dir = parseInt(btn.dataset.dir);
                const currentQty = (getCart().find(i => i.id === p.id) || {}).qty || 1;
                if (currentQty + dir < 1) {
                  removeFromCart(p.id);
                } else {
                  updateCartQty(p.id, dir);
                }
                renderSections();
              });
            });
          } else if (!inCart) {
            const addBtn = row.querySelector('.add-cart-btn');
            if (addBtn) {
              addBtn.addEventListener('click', () => {
                addToCart(productWithMeta);
                renderSections();
              });
            }
          }

          products.appendChild(row);
        }

        const divider = document.createElement('div');
        divider.className = 'section-divider';
        body.appendChild(divider);
        body.appendChild(products);
        drop.appendChild(toggle);
        drop.appendChild(body);
        container.appendChild(drop);
      }
    }

    // Re-render when username changes so buy buttons update
    const _origSaveUsername = saveUsername;
    saveUsername = function(name) {
      _origSaveUsername(name);
      if (STATE.data) renderSections();
    };

    loadData().then(data => {
      if (data) renderSections();
    });
  </script>
</body>
</html>
