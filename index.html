<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Unstable Lab Store</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="style.css?v=9">
</head>
<body>
  <div class="wrap">
    <header>
      <img class="logo" id="logo" src="logo.svg" alt="Unstable Lab"
           onerror="this.style.display='none';">
      <h1 id="server-name">Unstable Lab Store</h1>
      <p id="server-tagline">Loading…</p>
    </header>

    <div id="error" class="error" hidden></div>

    <div class="username-card">
      <div class="head" id="head" aria-hidden="true">?</div>
      <label for="username">Minecraft username:</label>
      <input id="username" type="text" placeholder="e.g. Steve" autocomplete="off" spellcheck="false">
      <span class="status" id="status">Enter your username to enable purchases.</span>
    </div>

    <div class="sections" id="sections"></div>

    <footer>
      Payments handled securely by Stripe. Your purchase is delivered in-game within about a minute of payment.
      <div class="footer-links">
        <a href="terms.html">Terms of Service</a>
      </div>
    </footer>
  </div>

  <script src="shop.js?v=9"></script>
  <script>
    function renderSections() {
      const container = document.getElementById('sections');
      container.innerHTML = '';
      const sections = (STATE.data && STATE.data.sections) || [];
      const hasUser = isValidUsername(STATE.username);

      for (const s of sections) {
        const drop = document.createElement('div');
        drop.className = 'section-drop';

        // Toggle button
        const toggle = document.createElement('button');
        toggle.className = 'section-toggle';
        toggle.type = 'button';
        toggle.innerHTML = `
          <div class="icon"></div>
          <div class="section-info">
            <strong></strong>
            <span></span>
          </div>
          <div class="chevron">▾</div>
        `;
        toggle.querySelector('.icon').textContent = s.icon || '📦';
        toggle.querySelector('strong').textContent = s.name;
        toggle.querySelector('span').textContent = s.description || '';
        toggle.addEventListener('click', () => {
          drop.classList.toggle('open');
        });

        // Products body
        const body = document.createElement('div');
        body.className = 'section-body';
        const products = document.createElement('div');
        products.className = 'section-products';

        for (const p of (s.products || [])) {
          const row = document.createElement('div');
          row.className = 'product';
          row.innerHTML = `
            <div class="product-info">
              <h3></h3>
              <div class="desc"></div>
            </div>
            <div class="product-price"></div>
            <div class="product-actions">
              <button class="buy-btn" ${hasUser ? '' : 'disabled'}>${hasUser ? 'Buy' : 'Enter username'}</button>
              <button class="add-cart-btn" data-product-id="" ${hasUser ? '' : 'disabled'} title="Add to cart">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
              </button>
            </div>
          `;
          row.querySelector('.add-cart-btn').dataset.productId = p.id;
          row.querySelector('h3').textContent = p.name;
          row.querySelector('.product-price').textContent = p.price_display;

          const descEl = row.querySelector('.desc');
          if (Array.isArray(p.description) && p.description.length) {
            const ul = document.createElement('ul');
            for (const item of p.description) {
              const li = document.createElement('li');
              li.textContent = item;
              ul.appendChild(li);
            }
            descEl.appendChild(ul);
          } else if (p.description) {
            descEl.textContent = p.description;
          }

          // Tag product with no_quantity if section says so
          const productWithMeta = Object.assign({}, p, s.no_quantity ? { no_quantity: true } : {});
          row.querySelector('.buy-btn').addEventListener('click', () => buy(productWithMeta));
          row.querySelector('.add-cart-btn').addEventListener('click', () => addToCart(productWithMeta));
          products.appendChild(row);
        }

        const divider = document.createElement('div');
        divider.className = 'section-divider';
        body.appendChild(divider);
        body.appendChild(products);
        drop.appendChild(toggle);
        drop.appendChild(body);
        container.appendChild(drop);
      }
    }

    // Re-render when username changes so buy buttons update
    const _origSaveUsername = saveUsername;
    saveUsername = function(name) {
      _origSaveUsername(name);
      if (STATE.data) renderSections();
    };

    loadData().then(data => {
      if (data) renderSections();
    });
  </script>
</body>
</html>
