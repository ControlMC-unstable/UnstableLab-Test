<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Unstable Lab Store</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap">
    <header>
      <img class="logo" id="logo" src="logo.png" alt="Unstable Lab"
           onerror="if(this.src.endsWith('logo.png')){this.src='logo.svg';}else{this.style.display='none';}">
      <h1 id="server-name">Unstable Lab Store</h1>
      <p id="server-tagline">Loading…</p>
    </header>

    <div id="error" class="error" hidden></div>

    <div class="username-card">
      <div class="head" id="head" aria-hidden="true">?</div>
      <label for="username">Minecraft username:</label>
      <input id="username" type="text" placeholder="e.g. Steve" autocomplete="off" spellcheck="false">
      <span class="status" id="status">Enter your username to enable purchases.</span>
    </div>

    <div class="sections" id="sections"></div>

    <footer>
      Payments handled securely by Stripe. Your purchase is delivered in-game within about a minute of payment.
    </footer>
  </div>

  <script src="shop.js"></script>
  <script>
    function setIcon(iconEl, section) {
      iconEl.innerHTML = '';
      iconEl.classList.remove('emoji');
      if (section.icon_image) {
        const img = document.createElement('img');
        img.src = section.icon_image;
        img.alt = '';
        img.onerror = () => {
          iconEl.classList.add('emoji');
          iconEl.textContent = section.icon || '📦';
        };
        iconEl.appendChild(img);
      } else {
        iconEl.classList.add('emoji');
        iconEl.textContent = section.icon || '📦';
      }
    }

    function renderSections() {
      const container = document.getElementById('sections');
      container.innerHTML = '';
      const sections = (STATE.data && STATE.data.sections) || [];
      for (const s of sections) {
        const a = document.createElement('a');
        a.className = 'section-card';
        a.href = `section.html?id=${encodeURIComponent(s.id)}`;
        a.innerHTML = `
          <div class="icon"></div>
          <h2></h2>
          <p></p>
          <div class="cta">Browse →</div>
        `;
        setIcon(a.querySelector('.icon'), s);
        a.querySelector('h2').textContent = s.name;
        a.querySelector('p').textContent = s.description || '';
        container.appendChild(a);
      }
    }

    loadData().then(data => {
      if (data) renderSections();
    });
  </script>
</body>
</html>
